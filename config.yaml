  hackernews:
    enabled: true
    min_score: 50
    keywords:
      - "AI"
      - "LLM"
      - "GPT"
      - "Claude"
      - "machine learning"
      - "OpenAI"
      - "Anthropic"
      - "Google DeepMind"
      - "Gemini"
      - "deep learning"

  reddit:
    enabled: true
    subreddits:
      - "MachineLearning"
      - "artificial"
      - "LocalLLaMA"
    min_score: 100

  github:
    enabled: true
    languages: []
    keywords:
      - "llm"
      - "ai"
      - "machine-learning"
      - "gpt"
      - "transformer"

  rss:
    enabled: true
    feeds:
      - name: "TechCrunch AI"
