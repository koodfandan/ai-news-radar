polling_interval_minutes: 15

llm:
  api_base: "https://api.deepseek.com/v1"
  api_key: "your-api-key-here"
  model: "deepseek-chat"

notifications:
  enabled: true
  quiet_hours:
    start: "23:00"
    end: "07:00"

web:
  host: "127.0.0.1"
  port: 8080

sources:
  twitter:
    enabled: true
    nitter_instances:
      - "https://nitter.net"
      - "https://xcancel.com"
      - "https://nitter.privacyredirect.com"
      - "https://nuku.trabun.org"
    accounts:
      # ===== AI新闻推特（公司官方/CEO）=====
      # 英文 - 公司官方
      - "OpenAI"
      - "AnthropicAI"
      - "GoogleDeepMind"
      - "GoogleAI"
      - "AIatMeta"
      - "xai"
      - "MistralAI"
      - "StabilityAI"
      - "huggingface"
      - "perplexity_ai"
      # 英文 - CEO/创始人
      - "sama"
      - "DarioAmodei"
      - "elonmusk"
      - "GregBrockman"
      - "ilyasut"
      - "demishassabis"
      # 中文 - AI新闻
