      - name: "36氪"
        url: "https://36kr.com/feed"
      - name: "少数派"
        url: "https://sspai.com/feed"
      - name: "爱范儿"
        url: "https://www.ifanr.com/feed"

  producthunt:
    enabled: true
    keywords:
      - "AI"
      - "LLM"
      - "GPT"
      - "machine learning"
      - "artificial intelligence"
      - "chatbot"
      - "copilot"
      - "agent"

  huggingface:
